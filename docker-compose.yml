services:
  n8n:
    image: n8nio/n8n:latest
    container_name: yt_agent_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - TZ=Asia/Kolkata
    volumes:
      - F:/YouTubu_AI:/data
      - F:/YouTubu_AI/n8n/n8n_data:/home/node/.n8n
      - F:/YouTubu_AI/n8n/n8n-files:/home/node/.n8n-files

  agent:
    build: ./agent
    container_name: yt_agent_worker
    volumes:
      - F:/YouTubu_AI:/data
    environment:
      - TZ=Asia/Kolkata
    # This container stays idle; n8n will trigger it via docker exec
    command: ["sleep", "infinity"]